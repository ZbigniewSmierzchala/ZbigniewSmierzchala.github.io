<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkedIn Banner Generator</title>
    <style>
        /* === IMPORT YOUR FONTS LOCALLY === */
        /* (Assuming this file is in the same folder as index.html) */
        @font-face { font-family: 'JetBrains Mono'; src: url('fonts/jetbrains-mono-v13-latin-700.woff2') format('woff2'); font-weight: 700; }
        @font-face { font-family: 'Inter'; src: url('fonts/inter-v12-latin-800.woff2') format('woff2'); font-weight: 800; }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* === THE BANNER CONTAINER === */
        /* Exact LinkedIn dimensions: 1584px x 396px */
        #banner-box {
            width: 1584px;
            height: 396px;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 70% 20%, #1e293b 0%, #020617 80%);
            border: 2px solid #333; /* Just for you to see the edges */
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* === BACKGROUND MESH === */
        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* === CONTENT LAYER (Right Aligned) === */
        .content {
            position: absolute;
            top: 50%;
            right: 80px; /* Keep away from right edge */
            transform: translateY(-50%);
            text-align: right;
            z-index: 2;
        }

        /* The Terminal Tag */
        .status-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: #4ade80; /* Neon Green */
            background: rgba(74, 222, 128, 0.1);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(74, 222, 128, 0.3);
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.15);
        }

        /* Main Headline */
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            color: #fff;
            margin: 0;
            line-height: 1.1;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5); /* Blue Glow */
        }

        h1 span {
            color: #38bdf8; /* Neon Blue */
        }

        /* Subline */
        p {
            font-family: 'JetBrains Mono', monospace;
            color: #94a3b8;
            font-size: 1.5rem;
            margin-top: 15px;
        }

    </style>
</head>
<body>

    <div id="banner-box">
        <canvas id="network-canvas"></canvas>
        
        <div class="content">
            <div class="status-badge">
                > SYSTEM_STATUS: TRANSITIONING_TO_CODE_
            </div>
            <h1>
                Strategy <span>//</span> AI <span>//</span> Dev
            </h1>
            <p>From Management Legacy to Future Stack.</p>
        </div>
    </div>

    <!-- YOUR NETWORK ANIMATION SCRIPT -->
    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        
        // Fixed size for the banner
        canvas.width = 1584;
        canvas.height = 396;
        
        let particles = [];
        
        function init() {
            for (let i = 0; i < 90; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    size: Math.random() * 2 + 1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(56, 189, 248, 0.6)"; 
            
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;

                // Bounce
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                // Draw Dot
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw Lines
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.25 - dist/600})`; 
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
